<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    .spacer {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #555;
    }

    .box {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 400px;
      padding: 3rem;
      border-radius: 24px;
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      opacity: 0;
    }

    .card.from-left  { transform: translateX(-300px) rotate(-15deg); }
    .card.from-right { transform: translateX(300px)  rotate(15deg);  }
    .card.from-below { transform: translateY(200px) scale(0.5);      }

    /* When .go is added, animate to final position */
    .card.from-left.go {
      animation: slideLeft 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .card.from-right.go {
      animation: slideRight 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .card.from-below.go {
      animation: riseUp 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(-300px) rotate(-15deg); }
      to   { opacity: 1; transform: translateX(0)       rotate(0deg);  }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(300px)  rotate(15deg); }
      to   { opacity: 1; transform: translateX(0)      rotate(0deg);  }
    }
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(200px) scale(0.5); }
      to   { opacity: 1; transform: translateY(0)     scale(1);   }
    }
  </style>
</head>
<body>

  <div class="spacer">↓ Scroll down ↓</div>

  <div class="box">
    <div class="card from-left" style="background:#1a3a6e;">
      Slides in from LEFT
    </div>
  </div>

  <div class="box">
    <div class="card from-right" style="background:#3a1a1a;">
      Slides in from RIGHT
    </div>
  </div>

  <div class="box">
    <div class="card from-below" style="background:#1a3a1a;">
      Rises up from BELOW
    </div>
  </div>

  <div class="box">
    <div class="card from-left" style="background:#3a2a1a;">
      Another LEFT slide
    </div>
  </div>

  <script>
    function check() {
      document.querySelectorAll(".card:not(.go)").forEach(function(el) {
        var rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight * 0.85) {
          el.classList.add("go");
        }
      });
    }

    // Run on scroll and on load
    window.addEventListener("scroll", check, { passive: true });
    window.addEventListener("load", check);
  </script>

</body>
</html>
